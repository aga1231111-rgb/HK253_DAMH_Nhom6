<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lịch sử phòng họp</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body data-page="meeting-history">
    <div data-include="header"></div>

    <div class="layout">
      <aside class="sidebar">
        <div data-include="menu"></div>
      </aside>

      <main class="content">
        <section class="panel">
          <div class="page-header">
            <div>
              <p class="eyebrow">History</p>
              <h2>Lịch sử phòng họp</h2>
              <p id="historySummary" class="lead">Đang tải...</p>
            </div>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Tên cuộc họp</th>
                  <th>Phòng</th>
                  <th>Nhân viên</th>
                  <th>Ngày giờ</th>
                  <th>Trạng thái</th>
                  <th>Ghi chú</th>
                </tr>
              </thead>
              <tbody id="historyTableBody"></tbody>
            </table>
          </div>
        </section>
      </main>
    </div>

    <div data-include="footer"></div>
    <script src="../js/app.js"></script>
  </body>
</html>
