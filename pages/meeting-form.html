<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tạo lịch họp</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body data-page="meeting-form">
    <div data-include="header"></div>

    <div class="layout">
      <aside class="sidebar">
        <div data-include="menu"></div>
      </aside>

      <main class="content">
        <section class="panel">
          <div class="page-header">
            <div>
              <p class="eyebrow">Booking</p>
              <h2>Tạo lịch họp</h2>
              <p class="lead">Chọn phòng, nhân viên và thời gian họp.</p>
            </div>
          </div>

          <form id="meetingForm">
            <div class="field">
              <label for="meetingTitle">Tên cuộc họp</label>
              <input id="meetingTitle" name="meetingTitle" required />
            </div>
            <div class="field">
              <label for="roomId">Phòng họp</label>
              <select id="roomId" name="roomId"></select>
            </div>
            <div class="field">
              <label for="employeeId">Nhân viên</label>
              <select id="employeeId" name="employeeId"></select>
            </div>
            <div class="field">
              <label for="meetingDate">Ngày và giờ</label>
              <input id="meetingDate" name="meetingDate" type="datetime-local" required />
            </div>
            <div class="field full">
              <label for="meetingNote">Ghi chú</label>
              <textarea id="meetingNote" name="meetingNote"></textarea>
            </div>
            <div id="formMessage" class="message"></div>
            <div class="actions">
              <button class="btn primary" type="submit">Lưu</button>
              <button class="btn secondary" type="button" id="cancelBtn">Hủy</button>
            </div>
          </form>

          <div class="section-block">
            <h3>Trạng thái phòng</h3>
            <div id="roomStatusList" class="status-list"></div>
          </div>
        </section>
      </main>
    </div>

    <div data-include="footer"></div>
    <script src="../js/app.js"></script>
  </body>
</html>
